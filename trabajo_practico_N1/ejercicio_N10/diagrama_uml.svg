<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <style>
      .box { fill:#f8f9fa; stroke:#333; stroke-width:1.5; }
      .title { font: bold 14px sans-serif; fill:#111; }
      .field { font: 12px monospace; fill:#111; }
      .strokeline { stroke:#333; stroke-width:1.4; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Programa (abstract) -->
  <rect x="300" y="20" width="300" height="110" rx="6" class="box"/>
  <text x="450" y="40" text-anchor="middle" class="title">Programa &lt;&lt;abstract&gt;&gt;</text>
  <text x="320" y="62" class="field">- String titulo</text>
  <text x="320" y="82" class="field">- String director</text>
  <text x="320" y="100" class="field">- int codigo</text>
  <text x="520" y="62" class="field">- int duracionMinutos</text>
  <text x="520" y="82" class="field">- String horaInicio</text>
  <text x="520" y="100" class="field">- String emisora</text>
  <text x="450" y="124" text-anchor="middle" class="field">+ String espacioComercial()</text>

  <!-- Radio -->
  <rect x="60" y="200" width="320" height="110" rx="6" class="box"/>
  <text x="220" y="224" text-anchor="middle" class="title">Radio</text>
  <text x="80" y="254" class="field">- String responsableMusicalizacion</text>
  <text x="80" y="274" class="field">- int minutosPropaganda</text>
  <text x="80" y="294" class="field">+ String espacioComercial()</text>

  <!-- Television -->
  <rect x="520" y="200" width="320" height="110" rx="6" class="box"/>
  <text x="680" y="224" text-anchor="middle" class="title">Television</text>
  <text x="540" y="254" class="field">- int comercialesPorTanda</text>
  <text x="540" y="274" class="field">- int numeroTandas</text>
  <text x="540" y="294" class="field">+ int totalComerciales()</text>
  <text x="540" y="312" class="field">+ String espacioComercial()</text>

  <!-- TestEjercicio10 -->
  <rect x="360" y="330" width="180" height="60" rx="6" class="box"/>
  <text x="450" y="355" text-anchor="middle" class="title">TestEjercicio10</text>
  <text x="450" y="375" text-anchor="middle" class="field">+ main(args)</text>

  <!-- Arrows Programa -> Radio and Programa -> Television -->
  <path d="M 360 130 L 220 200" class="strokeline" />
  <path d="M 540 130 L 680 200" class="strokeline" />

  <!-- Arrow TestEjercicio10 uses Programa (dashed) -->
  <path d="M 450 390 L 450 260" stroke="#666" stroke-width="1.2" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow)" />

</svg>
